name: ai-novel-writing-assistant

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_novel}
      POSTGRES_USER: ${POSTGRES_USER:-ai_novel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_novel_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.15.4
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    env_file:
      - path: .env.docker
        required: false
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      ALLOW_LAN: "true"
      AI_NOVEL_DATABASE_MODE: postgresql
      DATABASE_URL: postgresql://${POSTGRES_USER:-ai_novel}:${POSTGRES_PASSWORD:-ai_novel_dev_password}@postgres:5432/${POSTGRES_DB:-ai_novel}
      QDRANT_URL: http://qdrant:6333
      IMAGE_STORAGE_DRIVER: local
      IMAGE_STORAGE_ROOT: /app/storage/generated-images
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    volumes:
      - app_storage:/app/storage

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${AI_NOVEL_WEB_PORT:-8080}:8080"

volumes:
  postgres_data:
  qdrant_data:
  app_storage:
